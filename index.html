<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Garda — Carta dei Vini</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">

  <div class="header-top">
    <button class="theme-toggle" id="btn-tema">Chiaro</button>
  </div>

  <div class="menu-frame">
    <svg class="brand-badge" viewBox="0 0 200 200" aria-hidden="true">
      <circle cx="100" cy="100" r="90" fill="none" stroke="var(--gold-soft)" stroke-width="1.2" opacity="0.55"/>
      <circle cx="100" cy="100" r="83" fill="none" stroke="var(--gold-soft)" stroke-width="1" opacity="0.3"/>
      <path id="arcoAlto" d="M 34,108 a 66,66 0 1 1 132,0" fill="none"/>
      <text font-family="var(--font-sans)" font-size="12" letter-spacing="2" fill="var(--gold-soft)">
        <textPath href="#arcoAlto" startOffset="50%" text-anchor="middle">WINE &amp; TASTE</textPath>
      </text>
      <text x="100" y="108" text-anchor="middle" font-family="var(--font-sans)" font-weight="800" font-size="22" letter-spacing="1" fill="var(--parchment)">BAR GARDA</text>
      <text x="100" y="148" text-anchor="middle" font-family="var(--font-mono)" font-size="10" letter-spacing="3" fill="var(--muted)">LODI</text>
    </svg>

    <header class="site-header" style="border-bottom:none; padding-bottom:0;">
      <div class="eyebrow">Carta dei vini</div>
      <h1>Bar Garda</h1>
      <p>Bollicine, bianchi e rossi selezionati</p>
    </header>
  </div>

  <nav class="filters" id="filters"></nav>

  <main id="lista"></main>

  <footer class="site-footer">
    <span id="ultimo-aggiornamento"></span>
  </footer>

</div>

<script src="common.js"></script>
<script src="index.js"></script>
</body>
</html>
